<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#c99a2e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="ざいこさん" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/favicon.png" />
  <link rel="stylesheet" href="assets/styles.css" />
  <title>彌榮家のざいこさん</title>
</head>
<body>
<div class="app">
  <header class="hero">
    <div class="heroTop">
      <img class="icon" src="icons/icon-192.png" alt="金色の冷蔵庫アイコン" />
      <div>
        <p class="eyebrow">共有できる在庫管理アプリ</p>
        <div class="titleLine">
          <h1>彌榮家のざいこさん</h1>
          <div class="topIconBtns">
            <button class="ghost badgeBtn" id="openFilter" type="button" aria-label="検索・並び替え">🔍</button>
            <button class="ghost badgeBtn" id="openCategory" type="button" aria-label="カテゴリ管理">🏷️</button>
            <button class="ghost badgeBtn" id="openHistory" type="button" aria-label="更新履歴">🕘</button>
            <button class="primary heroAdd" id="openItem" type="button">登録</button>
          </div>
        </div>
        <div class="dateRow"><span class="updatedInline">最終更新：<strong id="updated">未更新</strong></span></div>
      </div>
    </div>
    <div class="notice" id="statusNotice">Supabaseに接続しています...</div>
  </header>

  <main>
    <section class="panel">
      <div class="rowTitle"><h2>買うものリスト</h2><span class="pill" id="buyCount">0件</span></div>
      <div id="buyList" class="buyList"></div>
    </section>

    <section class="panel">
      <div class="rowTitle">
        <h2>在庫一覧</h2>
        <div class="listMeta"><span class="pill" id="metaCat">全カテゴリ</span><span class="pill" id="metaSort">ピン留め優先</span><span class="pill" id="count">0件</span></div>
      </div>
      <div id="list" class="list"></div>
      <p id="empty" class="empty">該当する食材がありません</p>
    </section>
  </main>
</div>

<div class="modal" id="itemModal" aria-hidden="true">
  <div class="modalBg" data-close="itemModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2 id="itemModalTitle">食材を登録</h2><button class="closeBtn" data-close="itemModal" type="button">×</button></div>
    <form id="itemForm">
      <input id="editId" type="hidden" />
      <label><span>食材名</span><input id="name" required placeholder="例：ふじもと醤油" /></label>
      <label><span>アルファベット読み</span><input id="reading" required placeholder="例：fujimoto shoyu" /></label>
      <label><span>在庫</span><input id="stock" type="hidden" required value="1" /><div class="stockPick"><div class="stockBtns" id="stockMainBtns"></div><div class="stockBtns" id="stockFracBtns"></div><div class="stockPreview" id="stockPreview">選択中：1</div></div></label>
      <label><span>カテゴリ</span><select id="category"></select></label>
      <label><span>更新者名</span><input id="updatedBy" placeholder="例：もっピー / あきと / など" /></label>
      <label><span>メモ</span><input id="memo" placeholder="任意：開封済み、買う店など" /></label>
      <label class="checkRow"><input id="pinned" type="checkbox" /> よく使うものとして上に固定</label>
      <div class="formActions"><button class="primary" type="submit">保存する</button><button class="danger hidden" id="deleteFromForm" type="button">削除する</button></div>
    </form>
  </section>
</div>

<div class="modal" id="filterModal" aria-hidden="true">
  <div class="modalBg" data-close="filterModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2>検索・表示設定</h2><button class="closeBtn" data-close="filterModal" type="button">×</button></div>
    <div class="grid">
      <input id="search" type="search" placeholder="食材名・読みで部分検索" />
      <div class="two"><label><span>表示カテゴリ</span><select id="filter"><option value="all">すべて</option></select></label><label><span>並び順</span><select id="sort"><option value="pinned">ピン留め優先</option><option value="stock">在庫が少ない順</option><option value="reading">アルファベット読み順</option><option value="category">カテゴリ別</option><option value="name">食材名順</option></select></label></div>
      <label class="checkRow"><input id="pinOnly" type="checkbox" /> ピン留めだけ表示</label>
      <button class="primary" data-close="filterModal" type="button">反映して閉じる</button>
    </div>
  </section>
</div>

<div class="modal" id="catModal" aria-hidden="true">
  <div class="modalBg" data-close="catModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2>カテゴリ管理</h2><button class="closeBtn" data-close="catModal" type="button">×</button></div>
    <form id="catForm"><label><span>新規カテゴリ名</span><input id="catName" placeholder="例：冷凍食品" /></label><button class="dark" id="addCatBtn" type="button">カテゴリを追加</button></form>
    <div id="catList" class="list"></div>
  </section>
</div>

<div class="modal" id="renameCatModal" aria-hidden="true">
  <div class="modalBg" data-close="renameCatModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2>カテゴリ名称変更</h2><button class="closeBtn" data-close="renameCatModal" type="button">×</button></div>
    <form id="renameCatForm"><input id="renameCatOld" type="hidden" /><label><span>新しいカテゴリ名</span><input id="renameCatInput" required placeholder="例：冷蔵品" /></label><div class="formActions"><button class="ghost" data-close="renameCatModal" type="button">やめる</button><button class="primary" type="submit">変更する</button></div></form>
  </section>
</div>

<div class="modal" id="historyModal" aria-hidden="true">
  <div class="modalBg" data-close="historyModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2>更新履歴</h2><button class="closeBtn" data-close="historyModal" type="button">×</button></div>
    <div id="historyList" class="list"></div>
  </section>
</div>

<div class="modal" id="confirmModal" aria-hidden="true">
  <div class="modalBg" data-close="confirmModal"></div>
  <section class="modalPanel">
    <div class="modalHead"><h2 id="confirmTitle">確認</h2><button class="closeBtn" data-close="confirmModal" type="button">×</button></div>
    <p id="confirmText" class="confirmText"></p>
    <div id="confirmExtra" class="grid confirmExtra"></div>
    <div class="formActions"><button class="ghost" id="confirmCancel" type="button">やめる</button><button class="danger" id="confirmOk" type="button">削除する</button></div>
  </section>
</div>
<div id="toast" class="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
